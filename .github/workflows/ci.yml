name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  # Cancel in-progress runs on feature branches to save CI minutes.
  # Do NOT cancel on main: a mid-deploy cancellation can leave the branch
  # in a partially-deployed state.
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  lint-test-build:
    name: Lint → Test → Build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Security audit
        run: npm audit --audit-level=high

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm run test

      - name: Build production bundle
        run: npm run build
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}

      - name: Strip source maps (safety net — no Sentry upload)
        # Belt-and-suspenders: vite.config.ts skips map generation when
        # SENTRY_AUTH_TOKEN is absent, but this catches any edge cases.
        if: ${{ !secrets.SENTRY_AUTH_TOKEN }}
        run: find dist -name "*.map" -delete 2>/dev/null || true

      - name: Check bundle size
        run: |
          MAX_SIZE_KB=500
          BUNDLE_SIZE=$(du -sk dist/assets/*.js | awk '{sum+=$1} END{print sum}')
          echo "Bundle JS size: ${BUNDLE_SIZE}KB"
          if [ "$BUNDLE_SIZE" -gt "$MAX_SIZE_KB" ]; then
            echo "::error::JS bundle size (${BUNDLE_SIZE}KB) exceeds ${MAX_SIZE_KB}KB threshold. Investigate and reduce or update the threshold."
            exit 1
          fi

      - name: Upload build artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  worker-build:
    name: Worker Build + Test + Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: worker/package-lock.json
      - name: Install worker dependencies
        run: cd worker && npm ci
      - name: Security audit (worker)
        run: cd worker && npm audit --audit-level=high
      - name: Lint / type check worker
        run: cd worker && npx tsc --noEmit
      - name: Run worker tests
        run: cd worker && npm run test
      - name: Build worker
        run: cd worker && npm run build

  edge-functions-check:
    name: Edge Functions Validate
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v1
        with:
          deno-version: v1.x
      - name: Generate Deno lock file
        # Create a lock file from the shared module so deno check can verify
        # remote imports consistently across CI runs.
        run: |
          deno cache --lock=deno.lock --lock-write \
            supabase/functions/_shared/cors.ts \
            supabase/functions/_shared/rateLimit.ts \
            supabase/functions/_shared/signedUrlHelper.ts || true

      - name: Type check edge functions
        run: |
          for dir in supabase/functions/*/; do
            # Skip one-time migration tooling that is not deployed
            if [[ "$dir" == *"migrate-storage"* ]]; then
              echo "Skipping deprecated $dir"
              continue
            fi
            if [ -f "$dir/index.ts" ]; then
              echo "Checking $dir..."
              # Use lock file when available; fall back to --no-lock on first run
              if [ -f "deno.lock" ]; then
                deno check --lock=deno.lock "$dir/index.ts"
              else
                deno check --no-lock "$dir/index.ts"
              fi
            fi
          done

  deploy:
    name: Deploy (Edge Functions + Worker)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Only deploy on pushes to main after all checks pass.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [lint-test-build, worker-build, edge-functions-check]

    steps:
      - uses: actions/checkout@v4

      # ── Supabase Migrations + Edge Functions ────────────────────────
      # Requires secrets: SUPABASE_ACCESS_TOKEN, SUPABASE_PROJECT_ID, SUPABASE_DB_PASSWORD
      - name: Deploy edge functions
        uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Run database migrations
        run: |
          supabase db push \
            --project-ref "$SUPABASE_PROJECT_ID" \
            --password "$SUPABASE_DB_PASSWORD"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      - name: Push edge functions to Supabase
        run: |
          supabase functions deploy \
            --project-ref "$SUPABASE_PROJECT_ID" \
            --no-verify-jwt
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}

      # ── Worker (Render) ──────────────────────────────────────────────
      # Requires secret: RENDER_DEPLOY_HOOK_URL
      # Create at: Render dashboard → service → Settings → Deploy Hook
      - name: Trigger Render worker deploy
        run: |
          curl --silent --show-error --fail \
            -X POST "$RENDER_DEPLOY_HOOK_URL"
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
