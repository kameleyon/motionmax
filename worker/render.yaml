services:
  - type: worker
    name: motionmax-worker
    env: node
    region: oregon
    # Upgraded standard → pro (2 CPU / 4 GB) on the new Pro workspace.
    # Standard's 2 GB cap was OOM'ing on long-video exports (FFmpeg
    # plus music+SFX mixing pushed past 2 GB). Pro doubles that and
    # gives an extra CPU to parallelise FFmpeg passes.
    plan: pro
    # Horizontal autoscaling (Pro workspace feature). Render boots
    # additional worker instances when CPU/memory pressure is high
    # and scales back down when idle. Each instance runs the same
    # claim_pending_job RPC, so multiple instances naturally pick up
    # different jobs without coordination — N projects can render in
    # parallel up to maxInstances.
    scaling:
      minInstances: 1
      maxInstances: 4
      targetCPUPercent: 70
      targetMemoryPercent: 75
    buildCommand: npm ci
    startCommand: npm start
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: HYPEREAL_API_KEY
        sync: false
      - key: REPLICATE_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: ELEVENLABS_API_KEY
        sync: false
      - key: FISH_AUDIO_API_KEY
        sync: false
      - key: GOOGLE_TTS_API_KEY
        sync: false
      - key: LEMONFOX_API_KEY
        sync: false
      - key: SENTRY_DSN
        sync: false
      - key: HEALTH_AUTH_TOKEN
        sync: false
      - key: HEALTH_PORT
        value: "10000"
      - key: WORKER_CONCURRENCY
        sync: false
      - key: JOB_TIMEOUT_MS
        sync: false
      - key: SHUTDOWN_DRAIN_TIMEOUT
        sync: false
      - key: ALERT_WEBHOOK_URL
        sync: false
      - key: EXPORT_BATCH_SIZE
        sync: false
      - key: EXPORT_SCENE_TIMEOUT_MS
        sync: false
      - key: EXPORT_KEN_BURNS
        sync: false
      - key: EXPORT_CROSSFADE_DURATION
        sync: false
      - key: EXPORT_CROSSFADE_TIMEOUT
        sync: false
      - key: EXPORT_AI_VIDEO
        sync: false
      - key: EXPORT_AI_VIDEO_TIMEOUT
        sync: false
