name: Release Checklist

# ──────────────────────────────────────────────────────────────────────
# Runs on every git tag push matching v*.*.* (semver). Walks through a
# release checklist:
#
#   1. Verify supabase migrations are applied to prod
#      (best-effort: `supabase migration list --linked` should not
#      show any 'pending'). Output is logged, not gated, because
#      migrations are normally applied via deploy-prod.yml *before*
#      the release tag is cut.
#
#   2. Verify Sentry release has sourcemaps uploaded
#      (`sentry-cli releases files <release> list`).
#
#   3. Verify required env vars are set in production (Vercel API)
#      — sanity-checks names only, never values.
#
#   4. Tag the Stripe products with the new release version in metadata
#      (so Stripe events can be correlated back to a code release).
#
#   5. Post a Slack release-notes message to #releases.
#
# Manual / decision-heavy items (PR walkthrough, marketing post, comms
# to investors) remain in docs/release-runbook.md (TODO — to be added
# separately as a markdown checklist). Anything not automated here is
# printed at the end of the job for the on-call to tick off.
#
# All third-party actions SHA-pinned per B-NEW-5(a). The workflow is
# defensive: each step can be disabled by leaving the corresponding
# secret unset, in which case the step prints a `::warning::` and
# moves on rather than failing the release.
# ──────────────────────────────────────────────────────────────────────

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag to run the checklist against (e.g. v1.2.3)'
        required: true
        type: string

concurrency:
  group: release-checklist-${{ github.ref }}
  cancel-in-progress: false

jobs:
  checklist:
    name: Run release checklist
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0 # release notes generation wants tag-to-tag log

      - name: Resolve release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.release_tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          echo "Release tag: $TAG"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      # ── 1. Supabase: list pending migrations ──────────────────────
      - uses: supabase/setup-cli@b60b5899c73b63a2d2d651b1e90db8d4c9392f51 # v1
        with:
          version: 2.98.2

      - name: Verify Supabase migrations applied to prod
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_ID:   ${{ secrets.SUPABASE_PROJECT_ID }}
          SUPABASE_DB_PASSWORD:  ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ] || [ -z "$SUPABASE_PROJECT_ID" ]; then
            echo "::warning::Supabase secrets not set — skipping migration verification."
            exit 0
          fi
          supabase link --project-ref "$SUPABASE_PROJECT_ID" --password "$SUPABASE_DB_PASSWORD" || true
          # `migration list` exits 0 even when there are pending entries;
          # we grep for "  pending" (two-space prefix in the table column).
          output=$(supabase migration list 2>&1 || true)
          echo "$output"
          if echo "$output" | grep -qE '^\s*[0-9]+\s+pending\b'; then
            echo "::error::Pending Supabase migrations exist for prod. Run deploy-prod.yml before tagging a release."
            exit 1
          fi
          echo "✓ No pending migrations against prod."

      # ── 2. Sentry: verify the release has sourcemaps ──────────────
      - name: Verify Sentry release sourcemaps
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG:        ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT:    ${{ secrets.SENTRY_PROJECT }}
          RELEASE_TAG:       ${{ steps.tag.outputs.tag }}
        run: |
          if [ -z "$SENTRY_AUTH_TOKEN" ]; then
            echo "::warning::SENTRY_AUTH_TOKEN not set — skipping Sentry release verification."
            exit 0
          fi
          curl --max-time 60 -sSL https://sentry.io/get-cli/ | bash
          # `releases files <release> list` returns the uploaded artifacts.
          set +e
          file_count=$(sentry-cli releases files "$RELEASE_TAG" list 2>/dev/null | wc -l)
          set -e
          if [ "$file_count" -lt 1 ]; then
            echo "::warning::No source-map artifacts found for Sentry release $RELEASE_TAG. CI build may not have uploaded them; investigate."
          else
            echo "✓ Sentry release $RELEASE_TAG has $file_count artifact(s)."
          fi

      # ── 3. Vercel: sanity-check production env-var names ─────────
      - name: Verify Vercel production env-var presence
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "::warning::VERCEL_TOKEN not set — skipping env-var presence check."
            exit 0
          fi
          required=(
            VITE_SUPABASE_URL
            VITE_SUPABASE_PUBLISHABLE_KEY
            STRIPE_PUBLISHABLE_KEY
            SENTRY_DSN
          )
          listed=$(curl --max-time 30 -fsS \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            "https://api.vercel.com/v9/projects/${VERCEL_PROJECT_ID}/env?teamId=${VERCEL_ORG_ID}&target=production" \
            | jq -r '.envs[].key' 2>/dev/null || echo "")
          missing=0
          for k in "${required[@]}"; do
            if ! echo "$listed" | grep -qx "$k"; then
              echo "::error::Production env var '$k' is NOT set in Vercel."
              missing=$((missing+1))
            fi
          done
          if [ "$missing" -gt 0 ]; then
            exit 1
          fi
          echo "✓ All ${#required[@]} required env vars are present in Vercel production."

      # ── 4. Stripe: tag products with release version ─────────────
      - name: Tag Stripe products with release version
        env:
          STRIPE_API_KEY: ${{ secrets.STRIPE_API_KEY }}
          RELEASE_TAG:    ${{ steps.tag.outputs.tag }}
        run: |
          if [ -z "$STRIPE_API_KEY" ]; then
            echo "::warning::STRIPE_API_KEY not set — skipping Stripe metadata tagging."
            exit 0
          fi
          # List active products, attach release metadata. We only tag,
          # never modify pricing — this is annotation only.
          products=$(curl --max-time 30 -fsS \
            -u "$STRIPE_API_KEY:" \
            "https://api.stripe.com/v1/products?active=true&limit=100" \
            | jq -r '.data[].id' 2>/dev/null || echo "")
          for pid in $products; do
            curl --max-time 30 -fsS \
              -u "$STRIPE_API_KEY:" \
              -X POST "https://api.stripe.com/v1/products/$pid" \
              -d "metadata[motionmax_release]=$RELEASE_TAG" >/dev/null
            echo "  tagged $pid → motionmax_release=$RELEASE_TAG"
          done
          echo "✓ Stripe products tagged."

      # ── 5. Slack: post release notes to #releases ────────────────
      - name: Post release notes to Slack
        env:
          SLACK_RELEASES_WEBHOOK: ${{ secrets.SLACK_RELEASES_WEBHOOK }}
          SLACK_WEBHOOK_URL:      ${{ secrets.SLACK_WEBHOOK_URL }}
          RELEASE_TAG:            ${{ steps.tag.outputs.tag }}
        run: |
          # Prefer #releases-specific webhook if configured, else fall
          # back to the generic SLACK_WEBHOOK_URL (deploy alerts).
          webhook="${SLACK_RELEASES_WEBHOOK:-$SLACK_WEBHOOK_URL}"
          if [ -z "$webhook" ]; then
            echo "::warning::No Slack webhook configured — skipping release post."
            exit 0
          fi
          # Last-tag-to-this-tag commit list, max 20 entries.
          prev_tag=$(git describe --tags --abbrev=0 "${RELEASE_TAG}^" 2>/dev/null || echo "")
          if [ -n "$prev_tag" ]; then
            notes=$(git log --pretty=format:"• %s (%h)" "${prev_tag}..${RELEASE_TAG}" | head -20)
          else
            notes=$(git log --pretty=format:"• %s (%h)" -n 20)
          fi
          payload=$(jq -n \
            --arg tag "$RELEASE_TAG" \
            --arg notes "$notes" \
            --arg url   "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/releases/tag/${RELEASE_TAG}" \
            '{ text: ":rocket: motionmax \($tag) released\n\($notes)\n\n<\($url)|release page>" }')
          curl --max-time 30 -fsS \
            -X POST -H 'Content-Type: application/json' \
            --data "$payload" "$webhook"
          echo "✓ Posted release notes to Slack."

      # ── 6. Print residual manual checklist ───────────────────────
      - name: Print residual manual checklist
        run: |
          cat <<'EOF'
          ──────────────────────────────────────────────────────────
          Automated checklist complete. Residual manual items:

          [ ] Marketing site: schedule blog post / changelog entry.
          [ ] Investor / stakeholder comms (if material).
          [ ] App-store / TestFlight metadata (if mobile release).
          [ ] Verify Sentry "current release" toggle in dashboard.
          [ ] Verify Stripe webhook delivery in last 1h (no 5xx).

          See docs/deploy-flow.md → "Rollback runbook" for fast paths
          if anything looks off in the next 30 min after this tag.
          ──────────────────────────────────────────────────────────
          EOF

      - name: Notify on failure
        if: failure()
        run: |
          if [ -n "${{ secrets.SLACK_WEBHOOK_URL }}" ]; then
            curl --max-time 30 -X POST -H 'Content-Type: application/json' \
              --data "{\"text\":\":warning: Release checklist FAILED for ${{ steps.tag.outputs.tag }} — see ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}\"}" \
              "${{ secrets.SLACK_WEBHOOK_URL }}"
          fi
