name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  # Cancel in-progress runs on feature branches to save CI minutes.
  # Do NOT cancel on main: a mid-deploy cancellation can leave the branch
  # in a partially-deployed state.
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  lint-test-build:
    name: Lint → Test → Build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Security audit
        run: npm audit --audit-level=high

      # Atlas F-D9 / C-6-9 regression guard. Fails the build if any
      # migration dated >= 20260510 introduces an RLS policy with
      # USING(true) or WITH CHECK(true) for anon / authenticated /
      # public. Pre-baseline violations are already audited by
      # 20260510210000_anon_access_audit.sql; pass
      # --include-pre-baseline locally to inspect the full history.
      - name: RLS permissive policy lint
        run: node scripts/lint-rls-permissive.mjs

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm run test

      # C-10-2: enforce the coverage threshold (50%/40%) defined in
      # vitest.config.ts. Without this step, the threshold lives in
      # the config but is never tripped on PRs, so it's effectively
      # dormant.
      - name: Coverage check
        run: npm run test:coverage

      - name: Upload coverage to Codecov (optional)
        if: always()
        # Pinned per Wave 1 third-party-action policy. v4 = commit
        # 0da7aa657d958d32c117fc47e1ccaa00e3b35c61 (released 2024-04-25).
        uses: codecov/codecov-action@0da7aa657d958d32c117fc47e1ccaa00e3b35c61
        with:
          files: ./coverage/coverage-final.json
          # CODECOV_TOKEN is optional for public repos; if absent the
          # upload silently no-ops, so CI doesn't fail when running
          # forked PRs that can't access org secrets.
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

      - name: Build production bundle
        run: npm run build
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}

      - name: Strip source maps (safety net — no Sentry upload)
        # Belt-and-suspenders: vite.config.ts skips map generation when
        # SENTRY_AUTH_TOKEN is absent, but this catches any edge cases.
        if: ${{ !secrets.SENTRY_AUTH_TOKEN }}
        run: find dist -name "*.map" -delete 2>/dev/null || true

      - name: Check bundle size
        run: |
          MAX_SIZE_KB=500
          BUNDLE_SIZE=$(du -sk dist/assets/*.js | awk '{sum+=$1} END{print sum}')
          echo "Bundle JS size: ${BUNDLE_SIZE}KB"
          if [ "$BUNDLE_SIZE" -gt "$MAX_SIZE_KB" ]; then
            echo "::error::JS bundle size (${BUNDLE_SIZE}KB) exceeds ${MAX_SIZE_KB}KB threshold. Investigate and reduce or update the threshold."
            exit 1
          fi

      - name: Upload build artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  worker-build:
    name: Worker Build + Test + Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: worker/package-lock.json
      - name: Install worker dependencies
        run: cd worker && npm ci
      - name: Security audit (worker)
        run: cd worker && npm audit --audit-level=high
      - name: Lint / type check worker
        run: cd worker && npx tsc --noEmit
      - name: Run worker tests
        run: cd worker && npm run test
      - name: Build worker
        run: cd worker && npm run build

  edge-functions-check:
    name: Edge Functions Validate
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: denoland/setup-deno@11b63cf76cfcafb4e43f97b6cad24d8e8438f62d  # v1
        with:
          deno-version: v1.x
      - name: Generate Deno lock file
        # Create a lock file from the shared module so deno check can verify
        # remote imports consistently across CI runs.
        run: |
          deno cache --lock=deno.lock --lock-write \
            supabase/functions/_shared/cors.ts \
            supabase/functions/_shared/rateLimit.ts \
            supabase/functions/_shared/signedUrlHelper.ts || true

      - name: Type check edge functions
        run: |
          for dir in supabase/functions/*/; do
            # Skip one-time migration tooling that is not deployed
            if [[ "$dir" == *"migrate-storage"* ]]; then
              echo "Skipping deprecated $dir"
              continue
            fi
            if [ -f "$dir/index.ts" ]; then
              echo "Checking $dir..."
              # Use lock file when available; fall back to --no-lock on first run
              if [ -f "deno.lock" ]; then
                deno check --lock=deno.lock "$dir/index.ts"
              else
                deno check --no-lock "$dir/index.ts"
              fi
            fi
          done

  # ──────────────────────────────────────────────────────────────────────
  # E2E job (B-NEW-20 / Probe F-10-01).
  #
  # Boots a local Supabase stack (Postgres + GoTrue + PostgREST + Storage +
  # edge runtime) via the Supabase CLI, applies migrations + the test seed,
  # then runs Playwright against `npm run dev` (started automatically by
  # the `webServer` block in playwright.config.ts).
  #
  # The local Supabase URL + anon key are exported as GITHUB_ENV vars so the
  # frontend (Vite, started by Playwright's webServer) points at it instead
  # of the production project.
  #
  # IMPORTANT: branch-protection rules in repo Settings should mark this
  # check as REQUIRED on `main` so a red E2E blocks merges — and therefore
  # blocks deploy-staging.yml (which triggers on push to main) and
  # deploy-prod.yml (which is gated on staging being green).
  # ──────────────────────────────────────────────────────────────────────
  e2e:
    name: E2E (Playwright + local Supabase)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: [lint-test-build]

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Supabase CLI
        uses: supabase/setup-cli@b60b5899c73b63a2d2d651b1e90db8d4c9392f51  # v1
        with:
          version: latest

      # Boot a local Supabase stack — fully isolated, torn down at job end.
      # `--ignore-health-check` skips the slow remote-version check.
      - name: Start local Supabase
        run: supabase start --workdir . --ignore-health-check

      - name: Apply migrations + test seed
        run: |
          supabase db reset --workdir . --no-seed
          if [ -f supabase/seed.test.sql ]; then
            DB_URL=$(supabase status -o json | jq -r '.DB_URL // .db_url // empty')
            if [ -n "$DB_URL" ]; then
              psql "$DB_URL" -f supabase/seed.test.sql
            fi
          fi

      - name: Capture local Supabase URL + anon key
        run: |
          STATUS_JSON=$(supabase status -o json)
          API_URL=$(echo "$STATUS_JSON" | jq -r '.API_URL // .api_url')
          ANON_KEY=$(echo "$STATUS_JSON" | jq -r '.ANON_KEY // .anon_key')
          {
            echo "TEST_SUPABASE_URL=$API_URL"
            echo "TEST_SUPABASE_ANON_KEY=$ANON_KEY"
            echo "VITE_SUPABASE_URL=$API_URL"
            echo "VITE_SUPABASE_ANON_KEY=$ANON_KEY"
          } >> "$GITHUB_ENV"

      - name: Install Playwright browsers (chromium + webkit for mobile matrix)
        # C-10-1: mobile-chrome (Pixel 5) runs on Chromium; mobile-safari (iPhone 13)
        # and tablet (iPad gen 7) run on WebKit. Install both.
        run: npx playwright install --with-deps chromium webkit

      - name: Run Playwright E2E tests
        run: npm run test:e2e
        env:
          CI: "true"
          BASE_URL: http://localhost:8080

      - name: Upload Playwright HTML report
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Stop local Supabase
        if: always()
        run: supabase stop --workdir . || true

  # NOTE (B-NEW-17): the production deploy used to live here as the
  # `deploy` job, but it ran straight to prod with no manual gate. It
  # has moved to .github/workflows/deploy-prod.yml, which:
  #   1. Waits for deploy-staging.yml to succeed first
  #   2. Requires manual approval via the `production` GitHub
  #      Environment (configure required reviewers in repo Settings →
  #      Environments → production)
  # See docs/deploy-flow.md for the full sequence and rollback runbook.
  #
  # B-NEW-20: deploy-staging.yml (which triggers on push to main) is
  # blocked transitively by this `e2e` job — branch protection on `main`
  # marks `E2E (Playwright + local Supabase)` as a required check, so a
  # red E2E prevents the merge that would otherwise kick off staging.
  # Promotion to production also requires staging green, so the E2E
  # gate cascades all the way to prod without modifying deploy-*.yml.
