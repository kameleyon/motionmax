    <title>MotionMax &#x2013; AI Video Generator | Turn Text into Cinematic Videos</title>

    <meta name="description" content="Create stunning AI-generated cinematic videos, explainers, and visual stories from any text. AI scriptwriting, multilingual voiceover, image-to-video with 25+ caption styles. Start free." />
    <meta name="author" content="MotionMax" />
    <!-- C-12-2 (Signal S-C2) fix (2026-05-10): app-shell.html is the entry
         point for the authenticated React SPA (everything served behind
         /app, /dashboard-new, /settings, /billing, /admin, /lab, /usage,
         /editor, /auth and friends — see vercel.json rewrites). Default to
         `noindex, nofollow` so crawlers don't index half-rendered shells
         BEFORE Helmet hydrates. Public, indexable SPA routes (Pricing,
         Help, Terms, Privacy, AcceptableUse, Landing) MUST override this
         via <Helmet><meta name="robots" content="index, follow" /></Helmet>
         AND declare their own <link rel="canonical">. The Astro marketing
         site at `/` (and any future static pages) ships its own
         BaseLayout.astro meta — this file does NOT govern those routes. -->
    <meta name="robots" content="noindex, nofollow" />
    <meta name="language" content="English" />
    <meta name="rating" content="general" />
    <meta name="category" content="AI Video Generator, Content Creation, Video Production" />

    <meta name="keywords" content="AI video generator, text to video, cinematic video maker, AI explainer videos, document to video, AI narration, voice cloning, video storytelling, automated video production, AI video editor, TikTok video maker, YouTube Shorts generator, AI captions, image to video, Kling video, AI voiceover, multilingual voiceover, infographic maker, visual content creation, MotionMax" />

    <!-- C-12-1 (Signal S-C1) fix (2026-05-10): hardcoded canonical removed.
         Previously every SPA route inherited <link rel="canonical"
         href="https://motionmax.io"> from this shell, telling Google that
         /pricing, /dashboard-new, /billing, etc. were all duplicates of the
         homepage. Per-route canonicals are now declared via Helmet (see
         src/components/PageSeo.tsx and the <Helmet> block in each public
         page like src/pages/Pricing.tsx). hreflang stays because it's a
         site-wide language/region signal, not a per-URL one. -->
    <link rel="alternate" hreflang="x-default" href="https://www.motionmax.io/" />
    <link rel="alternate" hreflang="en" href="https://www.motionmax.io/" />

    <!-- B-5 fix (2026-05-10): asset bundle now distinct files at correct dimensions
         (favicon 64×64 was 2000×2000 / 752KB, apple-touch 180×180, OG 1200×630
         letterboxed onto carbon black). All 4 PNGs were md5-identical before this
         fix, breaking every social-share preview and PWA icon. Mj-36 fix (2026-05-10):
         theme-color, mask-icon color, manifest theme_color now all converge on brand
         carbon black `#0F1112` (matches background) — removed the third teal `#2D9A8C`. -->
    <link rel="icon" href="/favicon.png" />
    <link rel="icon" type="image/png" sizes="64x64" href="/favicon.png" />
    <link rel="shortcut icon" href="/favicon.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="mask-icon" href="/favicon.png" color="#14C8CC" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="msapplication-TileColor" content="#0F1112" />
    <meta name="msapplication-TileImage" content="/pwa-192x192.png" />
    <meta name="theme-color" content="#0F1112" />

    <meta name="mobile-web-app-capable" content="yes" />

    <!-- Preload LCP hero background to avoid render-blocking -->
    <link rel="preload" as="image" href="/herobackground.webp" fetchpriority="high">
    <!-- §5 PERF-002 / Edge F12 (2026-05-10): font triage.
         Public landing only needs Inter — every other family was caption
         decoratives or admin/billing chrome. Loading 17 families render-
         blocking on every visit was wasting ~14 HTTP requests + ~280 KB
         WOFF2 fetches before paint, just so the gated CreateNew/Editor
         caption picker would have its previews ready.
         Caption fonts (Bebas Neue, Bangers, Comfortaa, Oswald, Pangolin,
         Flavors, Chango, Luckiest Guy, Vina Sans, Special Elite, Rubik
         Mono One, Pacifico, Montserrat, Poppins) now load on demand from
         src/lib/loadCaptionFonts.ts when the workspace mounts.
         Admin/billing fonts (Instrument Serif, JetBrains Mono) are
         dynamically injected via the admin tokens CSS layer — NOT here.
         font-display:swap kept so first-paint isn't blocked while Inter
         loads from cache or network. -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
