name: Generate SBOM

# ──────────────────────────────────────────────────────────────────────
# Generates a CycloneDX-format Software Bill of Materials (SBOM) for
# each npm project in the repo, uploads them as workflow artifacts.
#
# Why three SBOMs:
#   - root (the Vite/React app + its devDependencies)
#   - marketing/ (Astro app, separate lockfile)
#   - worker/    (Node worker, separate lockfile)
# These don't share a hoisted node_modules — they each have their own
# package-lock.json — so a single root SBOM would miss most worker /
# marketing deps.
#
# Triggers: push to main + manual dispatch. Cron is intentionally NOT
# wired here: the SBOM doesn't change unless dependencies change, and
# dependabot already opens PRs (which push to main on merge).
#
# Retention: 90 days, matching what audit / SOC reviewers typically
# want to see for the last quarter.
# ──────────────────────────────────────────────────────────────────────

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sbom:
    name: SBOM (${{ matrix.target.name }})
    runs-on: ubuntu-latest
    timeout-minutes: 10

    strategy:
      fail-fast: false
      matrix:
        target:
          - name: root
            dir: '.'
          - name: marketing
            dir: 'marketing'
          - name: worker
            dir: 'worker'

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ${{ matrix.target.dir }}/package-lock.json

      - name: Install dependencies (${{ matrix.target.name }})
        working-directory: ${{ matrix.target.dir }}
        run: npm ci

      # Pin cyclonedx-npm to a known-good major. CycloneDX schema is
      # stable enough that minor bumps via npx are fine; the @4 pin
      # prevents accidental upgrades to a future v5 that changes the
      # JSON schema reviewers parse.
      - name: Generate SBOM (CycloneDX JSON)
        working-directory: ${{ matrix.target.dir }}
        run: |
          npx --yes @cyclonedx/cyclonedx-npm@4 \
            --output-file bom.json \
            --output-format JSON \
            --spec-version 1.6

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: sbom-${{ matrix.target.name }}
          path: ${{ matrix.target.dir }}/bom.json
          retention-days: 90
          if-no-files-found: error
